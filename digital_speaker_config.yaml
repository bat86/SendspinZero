substitutions:
  media_sample_rate: 44100

external_components:
  # For SPDIF (TOSLINK) support https://github.com/esphome/esphome/pull/8065:
  - source:
      type: git
      url: https://github.com/johnboiles/esphome
      ref: 996d283286514e3049122ce903bebd1dc6cb5b1a
    components: [i2s_audio]
    refresh: 1h

i2s_audio:
  - id: i2s_audio_bus

speaker:
  - platform: i2s_audio
    id: box_speaker
    sample_rate: ${media_sample_rate}
    i2s_dout_pin: GPIO4
    spdif_mode: true
    i2s_audio_id: i2s_audio_bus
    dac_type: external
    channel: stereo
    use_apll: true

  - platform: mixer
    id: mixing_speaker
    output_speaker: box_speaker
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: ${media_sample_rate}
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: ${media_sample_rate}
    bits_per_sample: 16
